<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página en construcción</title>

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="icon" type="image/png" href="https://www.mapei.com/favicon.ico">

    <style>
        :root {
            --mapei-blue: #007cc3;
            --mapei-blue-hover: #006eb0;
            --mapei-light: #f4f8fc;
            --text-dark: #1a1a1a;
            --text-muted: #666;
            --white: #ffffff;
            --hseq-green: #2ecc71;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", Tahoma, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f4f8fc 0%, #eaf4fb 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* HEADER */
        header {
            background: var(--mapei-blue);
            padding: 18px 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .back-btn {
            color: white;
            text-decoration: none;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: 0.2s;
        }

        .back-btn:hover {
            opacity: 0.85;
        }

        /* CONTENIDO */
        .construction-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .construction-card {
            background: white;
            width: 100%;
            max-width: 750px;
            border-radius: 28px;
            padding: 60px 40px;
            text-align: center;
            box-shadow: 0 12px 35px rgba(0,0,0,0.08);
            border: 1px solid #e2e8f0;
        }

        .construction-icon {
            width: 120px;
            height: 120px;
            margin: auto;
            border-radius: 50%;
            background: rgba(0, 124, 195, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
        }

        .construction-icon i {
            font-size: 4rem;
            color: var(--mapei-blue);
        }

        .construction-card h1 {
            color: var(--mapei-blue);
            font-size: 2.5rem;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .construction-card p {
            color: var(--text-muted);
            font-size: 1.1rem;
            line-height: 1.7;
            max-width: 600px;
            margin: auto;
        }

        .status-badge {
            display: inline-block;
            margin-top: 30px;
            background: #fff4d6;
            color: #b78103;
            padding: 12px 22px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 0.95rem;
        }

        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-top: 35px;
            background: var(--mapei-blue);
            color: white;
            text-decoration: none;
            padding: 14px 30px;
            border-radius: 30px;
            font-weight: 700;
            transition: 0.2s ease;
            box-shadow: 0 5px 15px rgba(0,124,195,0.2);
        }

        .btn-home:hover {
            background: var(--mapei-blue-hover);
            transform: translateY(-2px);
        }

        /* FOOTER */
        footer {
            background: var(--mapei-blue);
            color: white;
            text-align: center;
            padding: 20px;
            font-size: 0.95rem;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .construction-card {
                padding: 45px 25px;
            }

            .construction-card h1 {
                font-size: 2rem;
            }

            .construction-card p {
                font-size: 1rem;
            }

            .construction-icon {
                width: 95px;
                height: 95px;
            }

            .construction-icon i {
                font-size: 3rem;
            }
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <header>
        <a href="index.html" class="back-btn">
            <i class="fa-solid fa-arrow-left"></i>
            Volver a la intranet
        </a>
    </header>

    <!-- CONTENIDO -->
    <main class="construction-container">

        <div class="construction-card">

            <div class="construction-icon">
                <i class="fa-solid fa-screwdriver-wrench"></i>
            </div>

            <h1>Página en construcción</h1>

           

            <div class="status-badge">
                <i class="fa-solid fa-clock"></i>
                Disponible próximamente
            </div>

            <br>

            <a href="hseq.html" class="btn-home">
                <i class="fa-solid fa-house"></i>
                Regresar al inicio
            </a>

        </div>

    </main>

    <!-- FOOTER -->
    <footer>
        © 2026 Mapei Colombia · Intranet Corporativa
    </footer>

</body>

</html>
